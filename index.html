<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Aura | المنصة المتكاملة</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-bg: #fff5f8; --aura-pink: #f06292; --glass: rgba(255, 255, 255, 0.8); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigation Sidebar */
        .sidebar { width: 80px; background: white; border-left: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; }
        .nav-item { margin-bottom: 25px; color: #ccc; cursor: pointer; transition: 0.3s; font-size: 22px; }
        .nav-item.active { color: var(--aura-pink); }

        /* Content Area */
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; }
        .page { display: none; max-width: 800px; margin: 0 auto; }
        .page.active { display: block; }

        /* 1. Instagram Feed Style */
        .feed-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: 1px solid #eee; }
        .feed-header { padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .feed-img { width: 100%; display: block; }
        .feed-actions { padding: 10px; display: flex; gap: 15px; font-size: 18px; }
        .follow-btn { background: var(--aura-pink); color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }

        /* 2. Professional Drawing & Journal */
        .canvas-container { position: relative; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        canvas { border-radius: 20px; cursor: crosshair; background: #fff; width: 100%; height: 500px; }
        .brush-panel { display: flex; flex-wrap: wrap; gap: 10px; background: var(--glass); padding: 15px; border-radius: 15px; margin-top: 10px; }
        .tool-btn { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: white; }

        /* 3. Music Bot */
        .music-player { background: #1e1e1e; color: white; padding: 20px; border-radius: 20px; text-align: center; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; }

        /* 4. Tasks */
        .task-input { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-list { list-style: none; padding: 0; }
        .task-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* Profile */
        .profile-card { text-align: center; background: white; padding: 30px; border-radius: 20px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-item active" onclick="openPage('feed-page')"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" onclick="openPage('draw-page')"><i class="fas fa-pen-nib"></i></div>
        <div class="nav-item" onclick="openPage('music-page')"><i class="fas fa-compact-disc"></i></div>
        <div class="nav-item" onclick="openPage('task-page')"><i class="fas fa-tasks"></i></div>
        <div class="nav-item" onclick="openPage('profile-page')"><i class="fas fa-user"></i></div>
    </nav>

    <div class="content">
        <div id="feed-page" class="page active">
            <h2 style="color: var(--aura-pink);">Aura Feed ✨</h2>
            <div class="feed-card">
                <div class="feed-header">
                    <span><b>zahraa_salim</b></span>
                    <button class="follow-btn">Follow</button>
                </div>
                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=aura" class="feed-img">
                <div class="feed-actions">
                    <i class="far fa-heart"></i> <i class="far fa-comment"></i> <i class="far fa-paper-plane"></i>
                </div>
                <div style="padding:0 10px 10px;"><b>12 likes</b><br>بداية رحلة Aura!</div>
            </div>
        </div>

        <div id="draw-page" class="page">
            <h2>Journal & Creative Drawing 🎨</h2>
            <div class="canvas-container">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="brush-panel">
                <input type="color" id="colorPicker" title="اختر أي لون">
                <button class="tool-btn" onclick="setBrush('marker')">🖍️ ماركر</button>
                <button class="tool-btn" onclick="setBrush('pen')">🖋️ جاف</button>
                <button class="tool-btn" onclick="setBrush('oil')">🎨 زيتية</button>
                <button class="tool-btn" onclick="setBrush('pencil')">✏️ قلم رصاص</button>
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <button class="tool-btn" onclick="clearCanvas()">🗑️ مسح</button>
                <button class="tool-btn">✨ إضافة ستيكر</button>
            </div>
            <textarea placeholder="اكتبي يومياتك هنا..." style="width:100%; margin-top:20px; height:100px; border-radius:15px; border:1px solid #ddd; padding:10px;"></textarea>
        </div>

        <div id="music-page" class="page">
            <div class="music-player">
                <h2>Aura Beats Bot 🎵</h2>
                <input type="text" class="search-box" placeholder="ابحثي عن أغنية أو فنان...">
                <div id="results">قائمة الأغاني ستظهر هنا...</div>
                <div style="margin-top:30px; font-size:40px;">
                    <i class="fas fa-step-backward"></i> <i class="fas fa-play-circle"></i> <i class="fas fa-step-forward"></i>
                </div>
            </div>
        </div>

        <div id="task-page" class="page">
            <h2>قائمة المهام ✅</h2>
            <div class="task-input">
                <input type="text" id="newTask" placeholder="أضيفي مهمة جديدة..." style="flex-grow:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <button onclick="addTask()" class="follow-btn">إضافة</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
        </div>

        <div id="profile-page" class="page">
            <div class="profile-card">
                <div class="profile-pic" style="background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Zahraa') center/cover;"></div>
                <h3>Zahraa Salim Hallool</h3>
                <p>صانعة محتوى ومبرمجـة Aura ♡</p>
                <hr>
                <div style="display:flex; justify-content:space-around;">
                    <div><b>250</b><br>Followers</div>
                    <div><b>180</b><br>Following</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        // Navigation Logic
        function openPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Professional Drawing Logic
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let brushMode = 'pen';

        canvas.width = canvas.offsetWidth;
        canvas.height = 500;

        function startPosition(e) { painting = true; draw(e); }
        function finishedPosition() { painting = false; ctx.beginPath(); }
        
        function setBrush(mode) { brushMode = mode; }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = document.getElementById('brushSize').value;
            ctx.lineCap = "round";
            ctx.strokeStyle = document.getElementById('colorPicker').value;

            // Brush Styles
            if (brushMode === 'marker') ctx.globalAlpha = 0.5;
            else if (brushMode === 'oil') ctx.lineWidth *= 1.5;
            else ctx.globalAlpha = 1;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
            
            socket.emit('drawing', { x, y, color: ctx.strokeStyle, size: ctx.lineWidth, mode: brushMode });
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // Task Logic
        function addTask() {
            const val = document.getElementById('newTask').value;
            if(!val) return;
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `${val} <input type="checkbox">`;
            document.getElementById('taskList').appendChild(li);
            document.getElementById('newTask').value = '';
        }
    </script>
</body>
</html>
